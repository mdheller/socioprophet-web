name: product-build

on:
  pull_request:
    paths:
      - 'package.json'
      - 'src/**'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/product-build.yml'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'src/**'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/product-build.yml'

permissions:
  contents: read

jobs:
  product-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build product shell
        run: npm run build
